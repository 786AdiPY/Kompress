# Framework-agnostic compression pipeline.
# Every stage runs the SAME shared image (built once from the root Dockerfile)
# with a different command, so common/ adapters/ compressors/ are available to
# all of them. Stages exchange files through the shared `artifacts` volume and
# the bind-mounted ./data — identical to the artifacts/variants.json flow the
# local run_pipeline.bat uses.

volumes:
  artifacts:
  mlflow_data:

networks:
  pipeline:

# Shared config for every pipeline stage (one image, one context).
x-app: &app
  build: .
  image: compression-pipeline:local
  volumes:
    - ./data:/app/data
    - artifacts:/app/artifacts
  networks:
    - pipeline

services:

  # ── MLflow tracking server ─────────────────────────────────────────────────
  mlflow:
    build: ./mlflow
    container_name: mlflow
    env_file: ./mlflow/mlflow.env
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    networks:
      - pipeline
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Generate synthetic data ────────────────────────────────────────────────
  generate:
    <<: *app
    container_name: generate
    command: ["python", "data/generate.py", "--out", "data"]

  # ── Train baseline (classic-ML) ────────────────────────────────────────────
  train:
    <<: *app
    container_name: train
    depends_on:
      mlflow:
        condition: service_healthy
      generate:
        condition: service_completed_successfully
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      DATA_DIR: data
    command: ["python", "train/train.py"]

  # ── Compress: any model → ONNX FP32 → INT8 variants (manifest) ─────────────
  compress:
    <<: *app
    container_name: compress
    depends_on:
      train:
        condition: service_completed_successfully
    command: ["python", "compress/compress.py"]

  # ── Benchmark native + all compressed variants ─────────────────────────────
  benchmark:
    <<: *app
    container_name: benchmark
    depends_on:
      compress:
        condition: service_completed_successfully
    environment:
      RUNS: "200"
    command: ["python", "benchmark/benchmark.py"]

  # ── Quality gate ───────────────────────────────────────────────────────────
  gate:
    <<: *app
    container_name: gate
    depends_on:
      benchmark:
        condition: service_completed_successfully
    command: ["python", "gate/gate.py"]

  # ── Register best variant to MLflow ────────────────────────────────────────
  registry:
    <<: *app
    container_name: registry
    depends_on:
      gate:
        condition: service_completed_successfully
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    command: ["python", "registry/register.py"]

  # ── Deploy to Hugging Face Spaces (self-skips without HF_TOKEN/space_id) ────
  deploy:
    <<: *app
    container_name: deploy
    depends_on:
      gate:
        condition: service_completed_successfully
    environment:
      HF_TOKEN: ${HF_TOKEN:-}
      SPACE_ID: ${SPACE_ID:-}
    command: ["python", "deploy/hf_spaces_deploy.py"]

  # ── Serve (FastAPI, manifest-driven) ───────────────────────────────────────
  serve:
    <<: *app
    container_name: serve
    depends_on:
      registry:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    command: ["uvicorn", "serve.app:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Drift monitor ──────────────────────────────────────────────────────────
  monitor:
    <<: *app
    container_name: monitor
    depends_on:
      serve:
        condition: service_healthy
    environment:
      INCOMING_CSV: data/test.csv
    command: ["python", "monitor/drift.py"]
