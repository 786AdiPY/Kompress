name: Kompress CI

# CI for the Kompress PLATFORM — it tests Kompress's own code (does the engine,
# API, and dashboard build and work), NOT the customer models Kompress compresses.
# Compressing a specific model (churn, house_price, ...) is runtime work triggered
# through the API / plugin and tracked in that deployment's MLflow — it is not a
# build step and must never gate a platform change.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Backend: platform code + engine smoke test ──────────────────────────────
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install platform dependencies
        run: pip install -r requirements.txt
      - name: Platform smoke test (imports, schemas, engine on a fixture)
        run: python tests/smoke_test.py

  # ── Frontend: Front Door B dashboard type-checks + builds ───────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install web dependencies
        run: npm ci
        working-directory: web
      - name: Build dashboard (tsc + vite)
        run: npm run build
        working-directory: web
